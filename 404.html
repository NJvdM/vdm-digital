<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | VDM Digital</title>
    <meta name="description" content="The page you're looking for doesn't exist. Head back to VDM Digital." />
    <meta name="theme-color" content="#0A0A0A" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/styles/main.css" />
</head>

<body>

    <!-- Navigation -->
    <nav class="nav nav--scrolled" id="navbar">
        <div class="nav__container">
            <a href="/" class="nav__logo" id="nav-logo">
                <img src="/images/vdm-logo.png" alt="VDM Digital" class="nav__logo-img" width="36" height="36" />
                <span>VDM Digital</span>
            </a>
            <ul class="nav__links" id="nav-links">
                <li><a href="/#features" class="nav__link">Services</a></li>
                <li><a href="/#process" class="nav__link">Process</a></li>
                <li><a href="/#testimonials" class="nav__link">Testimonials</a></li>
                <li><a href="/contact.html" class="nav__link nav__link--cta" id="nav-contact-btn">Get in Touch</a></li>
            </ul>
            <button class="nav__toggle" id="nav-toggle" aria-label="Toggle navigation menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- 404 Content -->
    <section class="error-page" id="error-page">
        <div class="hero__bg">
            <div class="hero__gradient"></div>
            <div class="hero__grid"></div>
            <div class="hero__orb hero__orb--1"></div>
            <div class="hero__orb hero__orb--2"></div>
        </div>
        <div class="error-page__container">
            <div class="error-page__code">
                <span class="error-page__4">4</span>
                <span class="error-page__0">
                    <img src="/images/vdm-logo.png" alt="0" class="error-page__logo-ring" />
                </span>
                <span class="error-page__4">4</span>
            </div>
            <h1 class="error-page__title">Page not found</h1>
            <p class="error-page__text">The page you're looking for doesn't exist or has been moved. Let's get you back
                on track.</p>
            <div class="error-page__actions">
                <a href="/" class="btn btn--primary btn--large">
                    <span>Back to Home</span>
                    <svg class="btn__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </a>
                <a href="/contact.html" class="btn btn--ghost btn--large">Contact Us</a>
            </div>
        </div>
    </section>

    <script type="module" src="/scripts/main.js"></script>
</body>

</html>
